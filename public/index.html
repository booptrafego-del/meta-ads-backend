<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meta Ads Inspiration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f4f6fb; min-height: 100vh; }
.header { background: #1877f2; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
.header-icon { background: #fff; border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-title { color: #fff; font-weight: 700; font-size: 17px; }
.header-sub { color: #c8dcff; font-size: 12px; }
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 20px; margin-bottom: 16px; }
.card-title { font-weight: 700; font-size: 16px; color: #1877f2; margin-bottom: 18px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-weight: 600; margin-bottom: 4px; color: #333; font-size: 14px; }
.field input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa; color: #222; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #555; cursor: pointer; font-size: 13px; }
.chip.active { border-color: #1877f2; background: #e7f0fd; color: #1877f2; font-weight: 600; }
.btn { padding: 11px 22px; border-radius: 8px; border: none; cursor: pointer; background: #1877f2; color: #fff; font-weight: 700; font-size: 14px; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn.secondary { background: #fff; color: #1877f2; border: 1.5px solid #1877f2; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.error { background: #fff3f3; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c00; margin-bottom: 12px; display: none; }
.info { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #7d5a00; margin-bottom: 12px; display: none; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; background: #e4e6eb; color: #555; font-weight: 600; font-size: 13px; }
.tab.active { background: #1877f2; color: #fff; }
.insight { background: #e7f0fd; border: 1px solid #c3d8f8; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.insight-title { font-weight: 700; font-size: 13px; color: #1877f2; margin-bottom: 4px; }
.player-card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 20px; margin-bottom: 16px; }
.player-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.player-name { font-weight: 700; font-size: 16px; }
.badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.badge { font-size: 11px; background: #e7f0fd; color: #1877f2; border-radius: 6px; padding: 2px 8px; font-weight: 600; }
.badge.green { background: #e6f9ed; color: #1a7a3c; }
.badge.gray { background: #f0f0f0; color: #444; }
.btn-meta { text-decoration: none; background: #1877f2; color: #fff; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.copy-real { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #7d5a00; margin-bottom: 12px; }
.padroes-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.padrao { font-size: 13px; color: #555; padding: 3px 0; display: flex; gap: 6px; }
.funciona { background: #f6f8ff; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 12px; }
.ad-card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 20px; margin-bottom: 16px; }
.ad-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.ad-num { background: #1877f2; color: #fff; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
.ad-titulo { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
.ad-headline { font-weight: 600; font-size: 13px; color: #555; margin-bottom: 8px; }
.ad-copy { font-size: 14px; line-height: 1.7; background: #fafafa; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; white-space: pre-line; }
.ad-dicas { border-top: 1px solid #f0f0f0; padding-top: 10px; font-size: 12px; color: #555; display: flex; flex-direction: column; gap: 6px; }
.btn-copy { margin-top: 10px; background: none; border: 1px solid #ddd; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #555; }
.loading { text-align: center; padding: 30px; color: #888; font-size: 14px; display: none; line-height: 1.8; }
#results-ref, #results-sug { display: none; }
#results-ref.active, #results-sug.active { display: block; }
#result-tabs { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📣</div>
  <div>
    <div class="header-title">Meta Ads Inspiration</div>
    <div class="header-sub">Anúncios reais da Ad Library + sugestões inteligentes</div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">🎯 Parâmetros</div>

    <div class="field">
      <label>Nicho de mercado *</label>
      <input type="text" id="nicho" placeholder="Ex: academia, moda feminina, odontologia..."/>
    </div>
    <div class="field">
      <label>Produto ou serviço</label>
      <input type="text" id="produto" placeholder="Ex: plano mensal, vestido floral, clareamento..."/>
    </div>
    <div class="field">
      <label>Faixa etária do público</label>
      <div class="chips" id="chips-publico"></div>
    </div>
    <div class="field">
      <label>Objetivo do anúncio</label>
      <div class="chips" id="chips-objetivo"></div>
    </div>
    <div class="field">
      <label>Tom de voz</label>
      <div class="chips" id="chips-tom"></div>
    </div>
    <div class="field">
      <label>Diferencial</label>
      <input type="text" id="diferencial" placeholder="Ex: Entrega grátis, 10 anos de experiência..."/>
    </div>

    <div class="error" id="error"></div>
    <div class="info" id="info"></div>

    <div class="btn-row">
      <button class="btn" id="btn-buscar" onclick="buscarReferencias()">🔍 Buscar Anúncios Reais</button>
      <button class="btn secondary" id="btn-sugestoes" onclick="gerarSugestoes()">✨ Gerar Sugestões</button>
    </div>
  </div>

  <div class="loading" id="loading">
    ⏳ Buscando anúncios reais na Ad Library do Meta...<br>
    <small>Isso pode levar até 1 minuto. Aguarde!</small>
  </div>

  <div class="tabs" id="result-tabs">
    <button class="tab" id="tab-ref" onclick="switchResult('ref')">🔍 Anúncios Reais</button>
    <button class="tab" id="tab-sug" onclick="switchResult('sug')">✨ Sugestões</button>
  </div>

  <div id="results-ref"></div>
  <div id="results-sug"></div>
</div>

<script>
const PUBLICOS = ["18-24 anos","25-34 anos","35-44 anos","45-54 anos","55+ anos"];
const OBJETIVOS = ["Reconhecimento de marca","Geração de leads","Vendas","Tráfego para site","Engajamento","Instalações de app"];
const TONS = ["Profissional","Descontraído","Urgente","Emocional","Humorístico","Educativo"];

let publicoSel = [], objetivoSel = "", tomSel = "", refData = null;

function renderChips(id, opts, multi, get, set) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  opts.forEach(o => {
    const b = document.createElement("button");
    b.className = "chip" + (multi ? (get().includes(o) ? " active" : "") : (get() === o ? " active" : ""));
    b.textContent = o;
    b.onclick = () => {
      if (multi) set(get().includes(o) ? get().filter(x=>x!==o) : [...get(), o]);
      else set(get() === o ? "" : o);
      renderChips(id, opts, multi, get, set);
    };
    el.appendChild(b);
  });
}

renderChips("chips-publico", PUBLICOS, true, ()=>publicoSel, v=>publicoSel=v);
renderChips("chips-objetivo", OBJETIVOS, false, ()=>objetivoSel, v=>objetivoSel=v);
renderChips("chips-tom", TONS, false, ()=>tomSel, v=>tomSel=v);

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = "⚠️ " + msg;
  el.style.display = "block";
}
function hideError() { document.getElementById("error").style.display = "none"; }
function showInfo(msg) {
  const el = document.getElementById("info");
  el.textContent = msg;
  el.style.display = "block";
}
function hideInfo() { document.getElementById("info").style.display = "none"; }

function setLoading(on) {
  document.getElementById("loading").style.display = on ? "block" : "none";
  document.getElementById("btn-buscar").disabled = on;
  document.getElementById("btn-sugestoes").disabled = on;
}

async function buscarReferencias() {
  const nicho = document.getElementById("nicho").value.trim();
  hideError(); hideInfo();
  if (!nicho) { showError("Preencha o nicho."); return; }

  setLoading(true);
  document.getElementById("result-tabs").style.display = "none";
  document.getElementById("results-ref").innerHTML = "";
  document.getElementById("results-ref").className = "";

  try {
    const res = await fetch(`/buscar-anuncios?nicho=${encodeURIComponent(nicho)}&limite=20`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    if (!json.players || json.players.length === 0) {
      showInfo("Nenhum anúncio encontrado para esse nicho. Tente termos mais genéricos.");
      setLoading(false);
      return;
    }

    refData = json;
    renderReferencias(json);
    document.getElementById("result-tabs").style.display = "flex";
    switchResult("ref");
  } catch(e) {
    showError(e.message);
  }
  setLoading(false);
}

async function gerarSugestoes() {
  const nicho = document.getElementById("nicho").value.trim();
  const produto = document.getElementById("produto").value.trim();
  hideError(); hideInfo();
  if (!nicho && !produto) { showError("Preencha o nicho ou produto."); return; }

  setLoading(true);
  document.getElementById("results-sug").innerHTML = "";

  try {
    const res = await fetch("/gerar-sugestoes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nicho, produto,
        publico: publicoSel,
        objetivo: objetivoSel,
        tom: tomSel,
        diferencial: document.getElementById("diferencial").value,
        players: refData ? refData.players : []
      })
    });
    const parsed = await res.json();
    if (parsed.error) throw new Error(parsed.error);
    renderSugestoes(parsed);
    document.getElementById("result-tabs").style.display = "flex";
    switchResult("sug");
  } catch(e) {
    showError(e.message);
  }
  setLoading(false);
}

function renderReferencias(data) {
  const el = document.getElementById("results-ref");
  let html = `<div style="font-weight:700;font-size:13px;color:#1877f2;margin-bottom:12px">✅ ${data.total} anúncios reais encontrados no Meta</div>`;
  (data.players||[]).forEach(p => {
    html += `<div class="player-card">
      <div class="player-header">
        <div>
          <div class="player-name">🏢 ${p.nome}</div>
          <div class="badges">
            <span class="badge green">🔢 ${p.total_anuncios_ativos} anúncios ativos</span>
            <span class="badge">⏳ Desde ${p.anuncio_mais_antigo}</span>
            ${p.plataformas ? `<span class="badge gray">📱 ${p.plataformas}</span>` : ""}
          </div>
        </div>
        <a href="${p.url_biblioteca}" target="_blank" class="btn-meta">Ver no Meta →</a>
      </div>
      ${p.exemplo_copy && p.exemplo_copy !== "Não disponível" ? `<div class="copy-real"><strong>💬 Copy real:</strong><br>${p.exemplo_copy}</div>` : ""}
    </div>`;
  });
  el.innerHTML = html;
}

function renderSugestoes(ads) {
  const el = document.getElementById("results-sug");
  let html = `<div style="font-weight:700;font-size:16px;margin-bottom:12px">✨ Sugestões baseadas em anúncios reais</div>`;
  ads.forEach((s, i) => {
    html += `<div class="ad-card">
      <div class="ad-header">
        <span class="ad-num">Anúncio ${i+1}</span>
        <div>
          ${s.formato_recomendado ? `<span class="badge" style="background:#f3e8ff;color:#7c3aed">📐 ${s.formato_recomendado}</span>` : ""}
          <span class="badge">${s.cta}</span>
        </div>
      </div>
      ${s.inspirado_em ? `<div style="font-size:12px;color:#888;margin-bottom:8px">💡 ${s.inspirado_em}</div>` : ""}
      <div class="ad-titulo">${s.titulo}</div>
      <div class="ad-headline">${s.headline}</div>
      <div class="ad-copy">${s.copy}</div>
      <div class="ad-dicas">
        ${s.dica_segmentacao ? `<div><strong>🎯 Segmentação:</strong> ${s.dica_segmentacao}</div>` : ""}
        ${s.dica_criativo ? `<div><strong>🎨 Criativo:</strong> ${s.dica_criativo}</div>` : ""}
      </div>
      <button class="btn-copy" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(s.titulo+'\n'+s.headline+'\n\n'+s.copy+'\n\nCTA: '+s.cta)}'))">📋 Copiar texto</button>
    </div>`;
  });
  el.innerHTML = html;
}

function switchResult(t) {
  document.getElementById("tab-ref").classList.toggle("active", t==="ref");
  document.getElementById("tab-sug").classList.toggle("active", t==="sug");
  document.getElementById("results-ref").className = t==="ref" ? "active" : "";
  document.getElementById("results-sug").className = t==="sug" ? "active" : "";
}
</script>
</body>
</html>
